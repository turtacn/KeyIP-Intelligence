# =============================================================================
# KeyIP-Intelligence - Grafana Prometheus Datasource
# =============================================================================
# Provisioned datasource pointing to the KeyIP Prometheus server.
#
# References:
#   - Prometheus config:  deployments/prometheus/prometheus.yml
#   - Application metrics: internal/infrastructure/monitoring/metrics/
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"

  - name: Prometheus (Local Dev)
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: "POST"
