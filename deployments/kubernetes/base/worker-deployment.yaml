# =============================================================================
# KeyIP-Intelligence Worker Deployment
# =============================================================================
# Background worker process that consumes Kafka messages for async tasks:
# patent parsing, fingerprint computation, batch infringement analysis,
# report generation, knowledge graph building, and vector index updates.
# Exposes health checks on port 8081.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyip-worker
  labels:
    app.kubernetes.io/name: keyip-worker
    app.kubernetes.io/part-of: keyip
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keyip-worker
      app.kubernetes.io/part-of: keyip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keyip-worker
        app.kubernetes.io/part-of: keyip
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: keyip-worker
      securityContext:
        fsGroup: 1001
        runAsUser: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/turtacn/keyip-worker:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/app/configs/config.yaml"
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: postgres-password
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: neo4j-password
                  optional: true
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: redis-password
                  optional: true
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: opensearch-username
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: opensearch-password
                  optional: true
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: minio-access-key
                  optional: true
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: keyip-secrets
                  key: minio-secret-key
                  optional: true
          envFrom:
            - configMapRef:
                name: keyip-env
                optional: true
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1001
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: keyip-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}
