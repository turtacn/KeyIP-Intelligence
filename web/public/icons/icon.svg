<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="#fff" transform="translate(256,260)">
    <!-- Key body -->
    <rect x="-28" y="-60" width="56" height="100" rx="28" fill="#fff"/>
    <!-- Key head -->
    <circle cx="0" cy="-40" r="32" fill="#fff"/>
    <!-- Key hole -->
    <circle cx="0" cy="-40" r="14" fill="#3b82f6"/>
    <!-- Key teeth -->
    <rect x="28" y="10" width="40" height="8" rx="4" fill="#fff"/>
    <rect x="28" y="30" width="30" height="8" rx="4" fill="#fff"/>
  </g>
</svg>
