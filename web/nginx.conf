    }

    # Portfolios list
    location = /api/v1/portfolios {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"pf-001","name":"OLED Core","description":"Core OLED emitter and transport materials","status":"active","tech_domains":["OLED","Emitter","TADF"],"target_jurisdictions":["CN","US","EP","JP","KR"]},{"id":"pf-002","name":"OLED Host Materials","description":"Host materials for phosphorescent and TADF OLEDs","status":"active","tech_domains":["OLED","Host","Phosphorescent"],"target_jurisdictions":["CN","US","EP"]}],"pagination":{"page":1,"pageSize":20,"total":2}}';
