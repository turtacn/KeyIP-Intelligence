    location = /api/v1/lifecycle/events {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"evt-001","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"filing","event_date":"2024-03-15","description":"Patent application filed with CNIPA"},{"id":"evt-002","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"publication","event_date":"2024-09-15","description":"Application published"},{"id":"evt-003","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"grant","event_date":"2025-01-20","description":"Patent granted"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # Knowledge graph
    location = /api/v1/knowledge-graph {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"nodes":[{"id":"d1","label":"CN115650927B","type":"patent"},{"id":"d2","label":"US11678901B2","type":"patent"},{"id":"c1","label":"CBP","type":"molecule"},{"id":"c7","label":"DMAC-TRZ","type":"molecule"},{"id":"c9","label":"Ir(ppy)3","type":"molecule"},{"id":"c8","label":"4CzIPN","type":"molecule"},{"id":"c4","label":"NPB","type":"molecule"}],"edges":[{"source":"d1","target":"c1","type":"contains"},{"source":"d1","target":"c7","type":"contains"},{"source":"d2","target":"c9","type":"contains"},{"source":"d2","target":"c8","type":"contains"}],"total_nodes":7,"total_edges":4}}';
    }

    # FTO Search
    location = /api/v1/fto/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"fto-001","patent_number":"US9876543B2","title":"Organic electroluminescent device","assignee":"Competitor A","risk_level":"HIGH","similarity_score":0.85,"relevant_claims":[1,3,5]},{"id":"fto-002","patent_number":"EP3456789A1","title":"Blue phosphorescent compound","assignee":"Competitor B","risk_level":"MEDIUM","similarity_score":0.62,"relevant_claims":[2,4]}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # Partners
    location = /api/v1/partners {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"p-001","name":"Tokyo Chemical Industry","type":"supplier","country":"JP","status":"active"},{"id":"p-002","name":"Sigma-Aldrich","type":"supplier","country":"US","status":"active"},{"id":"p-003","name":"Samsung Display","type":"collaborator","country":"KR","status":"active"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # Settings
    location = /api/v1/settings {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"theme":"light","language":"en","notifications":true}}';
    }

    # Infringement Watch
    location = /api/v1/infringement/watch {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[],"pagination":{"page":1,"pageSize":20,"total":0}}';
    }

    # Portfolio Optimizer (singular alias)
    location = /api/v1/portfolio/optimize {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"recommendations":[],"score":0}}';
    }
    location = /api/v1/portfolios/scores {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"overall_score":76,"technical_score":82,"legal_score":71,"commercial_score":74}}';
    }
    location = /api/v1/portfolios/coverage {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"CN":8,"US":3,"EP":2,"JP":1,"KR":1}}';
    }
    location ~ ^/api/v1/portfolios/(?<pf_id>[^/]+)/analysis$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"portfolio_id":"$pf_id","total_patents":15,"by_jurisdiction":{"CN":8,"US":3},"by_status":{"granted":10,"pending":3},"top_ipc_codes":["H10K 50/00","H10K 85/00"],"recommendations":["Expand JP filings"]}}';
    }

    # Patent citations — returns CitationNetworkResponse expected by KnowledgeGraph page
    location ~ ^/api/v1/patents/(?<patent_id>[^/]+)/citations$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"patent_id":"$patent_id","patent_number":"$patent_id","title":"Patent $patent_id — OLED Blue Host Material","forward_citations":[{"patent_number":"US2023100456A1","title":"Blue TADF emitter with triazine acceptor","relation":"cites"},{"patent_number":"CN115901234A","title":"Organic light-emitting device with improved lifetime","relation":"cites"},{"patent_number":"EP4123456B1","title":"Heterocyclic compound for OLED","relation":"cites"},{"patent_number":"KR1020230123456A","title":"Blue phosphorescent OLED","relation":"cites"}],"backward_citations":[{"patent_number":"US10987654B2","title":"Carbazole-based host material","relation":"cited_by"},{"patent_number":"CN114567890B","title":"Bipolar host for phosphorescent OLED","relation":"cited_by"}],"total_citations":6}}';
    }

    # Auth - local stub (dev/docker-machine 环境下绕过 apiserver 的 bcrypt 验证)
    location = /api/v1/auth/signin {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"access_token":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..stub-signature","token_type":"Bearer","expires_in":86400}}';
    }
    location = /api/v1/auth/me {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"b0000001-0000-0000-0000-000000000001","email":"turta@keyip.io","username":"turta","display_name":"Turta","locale":"zh-CN","status":"active","roles":["super_admin"]}}';
    }

    # Health - proxy to apiserver
    location = /api/v1/healthz        { proxy_pass http://keyip-apiserver:8080; }
    location = /api/v1/healthz/detail { proxy_pass http://keyip-apiserver:8080; }

    # Patent detail, family - regex stubs
    location ~ ^/api/v1/patents/(?<patent_id>[^/]+)$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"$patent_id","title":"Patent $patent_id","abstract":"Patent detail from database","filing_date":"2024-01-01","status":"granted","assignee":"KeyIP Org","ipcCodes":["H10K 50/00"],"claims":[{"no":1,"text":"An OLED device claim..."}],"citationsForward":12,"citationsBackward":8}}';
    }
    location ~ ^/api/v1/patents/(?<patent_id>[^/]+)/family$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"family_id":"FAM-$patent_id","members":[{"id":"$patent_id","jurisdiction":"CN","status":"granted"},{"id":"US-$patent_id","jurisdiction":"US","status":"pending"},{"id":"EP-$patent_id","jurisdiction":"EP","status":"granted"}]}}';
    }

    # Molecule detail - proxy to apiserver (real DB data)
    location ~ ^/api/v1/molecules/(?<mol_id>[^/]+)$ {
        proxy_pass http://keyip-apiserver:8080;
        proxy_set_header Host $host;
    }

    # Molecule search
    location = /api/v1/molecules/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[],"pagination":{"page":1,"pageSize":20,"total":0}}';
    }

    # Portfolio detail and constellation
    location ~ ^/api/v1/portfolios/(?<pf_id>[^/]+)/constellation$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"portfolio_id":"$pf_id","points":[{"x":0.45,"y":0.55,"r":12,"color":"green","label":"CN115650927B","category":"H10K 50/00"},{"x":0.55,"y":0.42,"r":10,"color":"blue","label":"US11678901B2","category":"H10K 85/00"},{"x":0.38,"y":0.65,"r":8,"color":"amber","label":"EP3988567B1","category":"H10K 50/00"}],"clusters":[{"name":"OLED Emitters","center_x":0.45,"center_y":0.55,"radius":0.25}],"white_spaces":[],"total_points":3}}';
    }
    location ~ ^/api/v1/portfolios/(?<pf_id>[^/]+)$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"$pf_id","name":"Portfolio $pf_id","description":"KeyIP OLED portfolio","totalPatents":15,"jurisdictions":["CN","US","EP","JP","KR"]}}';
    }

    # Infringement Alerts (with real molecule UUIDs)
    location = /api/v1/infringement/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"inf-001","targetPatentId":"US11678901B2","triggerMoleculeId":"c0000001-0000-0000-0000-000000000009","riskLevel":"HIGH","literalScore":0.87,"docScore":0.72,"detectedAt":"2026-04-28T10:00:00Z","status":"new"},{"id":"inf-002","targetPatentId":"CN115650927B","triggerMoleculeId":"c0000001-0000-0000-0000-000000000001","riskLevel":"MEDIUM","literalScore":0.72,"detectedAt":"2026-05-01T09:00:00Z","status":"reviewed"},{"id":"inf-003","targetPatentId":"JP2023501234A","triggerMoleculeId":"c0000001-0000-0000-0000-000000000007","riskLevel":"MEDIUM","literalScore":0.58,"docScore":0.45,"detectedAt":"2026-05-05T11:00:00Z","status":"new"},{"id":"inf-004","targetPatentId":"EP3988567B1","triggerMoleculeId":"c0000001-0000-0000-0000-000000000004","riskLevel":"LOW","literalScore":0.31,"detectedAt":"2026-05-03T14:00:00Z","status":"escalated"},{"id":"inf-005","targetPatentId":"KR1020230078901B1","triggerMoleculeId":"c0000001-0000-0000-0000-000000000012","riskLevel":"LOW","literalScore":0.25,"detectedAt":"2026-05-10T08:00:00Z","status":"new"}],"pagination":{"page":1,"pageSize":20,"total":5}}';
    }

    # Patent Search (POST) — 前端 Portfolio/PatentMining 调用
    location = /api/v1/patents/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"d0000001-0000-0000-0000-000000000001","patent_number":"CN115650927B","title":"一种有机发光器件用蓝光主体材料及其制备方法与应用","patent_type":"invention","status":"granted","filing_date":"2024-03-15","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C09K 11/06"]},{"id":"d0000001-0000-0000-0000-000000000002","patent_number":"CN115650928B","title":"一种有机发光器件用空穴传输材料及其应用","patent_type":"invention","status":"granted","filing_date":"2024-05-20","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C07D 403/04"]},{"id":"d0000001-0000-0000-0000-000000000003","patent_number":"US11678901B2","title":"Phosphorescent Organometallic Compound for Organic Light-Emitting Device","patent_type":"invention","status":"granted","filing_date":"2023-08-10","assignee_name":"KeyIP OLED Lab","jurisdiction":"US","ipc_codes":["H10K 85/00","C07F 15/00"]},{"id":"d0000001-0000-0000-0000-000000000004","patent_number":"CN115650929B","title":"Thermally Activated Delayed Fluorescence Material for Blue OLED","patent_type":"invention","status":"pending","filing_date":"2025-01-12","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C09K 11/06"]},{"id":"d0000001-0000-0000-0000-000000000005","patent_number":"EP3988567B1","title":"Electron Transport Material for Organic Light-Emitting Device","patent_type":"invention","status":"granted","filing_date":"2024-02-28","assignee_name":"KeyIP OLED Lab","jurisdiction":"EP","ipc_codes":["H10K 50/00","C07D 251/24"]}],"pagination":{"page":1,"pageSize":20,"total":5}}';
    }

    # Patent Advanced Search
    location = /api/v1/patents/search/advanced {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[],"pagination":{"page":1,"pageSize":20,"total":0}}';
    }

    # Patent Stats
    location = /api/v1/patents/stats {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"total":5,"by_jurisdiction":{"CN":3,"US":1,"EP":1},"by_status":{"granted":4,"pending":1}}}';
    }

    # Catch-all - proxy to apiserver
    location /api/ {
        proxy_pass http://keyip-apiserver:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ \.js$ { add_header Content-Type application/javascript; }
    location / { try_files $uri $uri/ /index.html; }
}
