server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    index index.html;

    # =========================================================================
    # STUBS — hardcoded dev data for endpoints without working Go handlers.
    # All other /api/ routes → proxy_pass to keyip-apiserver:8080 (REAL data).
    # =========================================================================

    # --- Dashboard metrics (no Go handler yet) ---
    location = /api/v1/dashboard/metrics {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"totalPatents":51,"activePatents":45,"pendingPatents":6,"highRiskAlerts":3,"dueThisMonth":2,"monthlyApplicationTrend":[{"month":"Jan","filed":5,"granted":2},{"month":"Feb","filed":3,"granted":1},{"month":"Mar","filed":7,"granted":3},{"month":"Apr","filed":4,"granted":2},{"month":"May","filed":6,"granted":4},{"month":"Jun","filed":8,"granted":2}],"jurisdictionBreakdown":[{"jurisdiction":"CN","count":28},{"jurisdiction":"US","count":12},{"jurisdiction":"EP","count":6},{"jurisdiction":"JP","count":3},{"jurisdiction":"KR","count":2}],"competitorComparison":[{"name":"KeyIP","portfolioSize":51},{"name":"Samsung SDI","portfolioSize":12500},{"name":"LG Chem","portfolioSize":9800},{"name":"UDC","portfolioSize":4500}],"portfolioHealthScore":78,"upcomingDeadlines":[],"recentAlerts":[]}}';
    }

    # --- Alerts aggregation (no Go handler yet) ---
    location = /api/v1/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"alert-001","type":"deadline","severity":"high","title":"CN Patent Renewal Due","message":"Patent CN115650927B renewal fee due in 30 days","is_read":false,"created_at":"2026-05-10T08:00:00Z"},{"id":"alert-002","type":"infringement","severity":"high","title":"Potential Infringement Detected","message":"US11678901B2 may infringe your portfolio","is_read":false,"created_at":"2026-05-09T14:00:00Z"},{"id":"alert-003","type":"status","severity":"medium","title":"Patent Granted","message":"KR patent application has been granted","is_read":true,"created_at":"2026-05-08T10:00:00Z"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Lifecycle events listing (no Go handler yet) ---
    location = /api/v1/lifecycle/events {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"evt-001","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"filing","event_date":"2024-03-15","description":"Patent application filed with CNIPA"},{"id":"evt-002","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"publication","event_date":"2024-09-15","description":"Application published"},{"id":"evt-003","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"grant","event_date":"2025-01-20","description":"Patent granted"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Knowledge graph (no Go handler yet) ---
    location = /api/v1/knowledge-graph {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"nodes":[{"id":"d1","label":"CN115650927B","type":"patent"},{"id":"d2","label":"US11678901B2","type":"patent"},{"id":"c1","label":"CBP","type":"molecule"},{"id":"c7","label":"DMAC-TRZ","type":"molecule"},{"id":"c9","label":"Ir(ppy)3","type":"molecule"},{"id":"c8","label":"4CzIPN","type":"molecule"},{"id":"c4","label":"NPB","type":"molecule"}],"edges":[{"source":"d1","target":"c1","type":"contains"},{"source":"d1","target":"c7","type":"contains"},{"source":"d2","target":"c9","type":"contains"},{"source":"d2","target":"c8","type":"contains"}],"total_nodes":7,"total_edges":4}}';
    }

    # --- Partners (no Go handler yet) ---
    location = /api/v1/partners {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"p-001","name":"Tokyo Chemical Industry","type":"supplier","country":"JP","status":"active"},{"id":"p-002","name":"Sigma-Aldrich","type":"supplier","country":"US","status":"active"},{"id":"p-003","name":"Samsung Display","type":"collaborator","country":"KR","status":"active"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Settings (no Go handler yet) ---
    location = /api/v1/settings {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"theme":"light","language":"en","notifications":true}}';
    }

    # --- Infringement alerts (no Go handler yet) ---
    location = /api/v1/infringement/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"inf-001","targetPatentId":"US11678901B2","triggerMoleculeId":"c0000001-0000-0000-0000-000000000009","riskLevel":"HIGH","literalScore":0.87,"detectedAt":"2026-04-28T10:00:00Z","status":"new"},{"id":"inf-002","targetPatentId":"CN115650927B","triggerMoleculeId":"c0000001-0000-0000-0000-000000000001","riskLevel":"MEDIUM","literalScore":0.72,"detectedAt":"2026-05-01T09:00:00Z","status":"reviewed"}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # --- Portfolio scores (no Go handler yet) ---
    location = /api/v1/portfolios/scores {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"overall_score":78,"technical_score":82,"legal_score":71,"commercial_score":74}}';
    }

    # --- Portfolio coverage (no Go handler yet) ---
    location = /api/v1/portfolios/coverage {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"CN":28,"US":12,"EP":6,"JP":3,"KR":2}}';
    }

    # =========================================================================
    # ALIASES / TEMP STUBS
    # =========================================================================

    # lifecycle/deadlines
    location = /api/v1/lifecycle/deadlines {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"dl-001","patent_id":"d0000001-0000-0000-0000-000000000001","patent_number":"CN115650927B","deadline_type":"renewal","due_date":"2026-06-15","status":"pending","description":"Annual renewal fee due"},{"id":"dl-002","patent_id":"d0000001-0000-0000-0000-000000000001","patent_number":"CN115650927B","deadline_type":"office_action","due_date":"2026-07-01","status":"pending","description":"Respond to office action"}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # fto/search
    location = /api/v1/fto/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"fto-001","patent_number":"US9876543B2","title":"Organic electroluminescent device","assignee":"Competitor A","risk_level":"HIGH","similarity_score":0.85,"relevant_claims":[1,3,5]},{"id":"fto-002","patent_number":"EP3456789A1","title":"Blue phosphorescent compound","assignee":"Competitor B","risk_level":"MEDIUM","similarity_score":0.62,"relevant_claims":[2,4]}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # infringement/watch
    location = /api/v1/infringement/watch {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"inf-w-001","target_patent_id":"US9876543B2","title":"Potential infringement on OLED emitter","risk_level":"HIGH","detected_at":"2026-05-10T08:00:00Z","status":"new"},{"id":"inf-w-002","target_patent_id":"EP3456789A1","title":"Blue phosphorescent compound overlap","risk_level":"MEDIUM","detected_at":"2026-05-05T11:00:00Z","status":"reviewed"}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # portfolios/summary
    location = /api/v1/portfolios/summary {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"pf-001","name":"OLED Core Portfolio","description":"OLED emitter and transport materials","total_patents":51,"total_value":25000000,"by_jurisdiction":{"CN":28,"US":12,"EP":6,"JP":3,"KR":2},"by_status":{"granted":45,"pending":6},"top_ipc_codes":["H10K 50/00","H10K 85/00","C09K 11/06","C07D 209/00"],"recommendations":["Increase KR filings","Prioritize TADF emitter patents"]}}';
    }

    # portfolios/{id}/optimize alias
    location = /api/v1/portfolio/optimize {
        proxy_pass http://keyip-apiserver:8080/api/v1/portfolios/pf-001/optimize;
        proxy_set_header Host $host;
    }

    # Patent detail by patent_number (regex)
    location ~ ^/api/v1/patents/([A-Z][A-Z][0-9]+[A-Z][0-9]*)$ {
        default_type application/json;
        set $pn $1;
        return 200 '{"code":0,"message":"ok","data":{"id":"d0000001-0000-0000-0000-000000000003","patent_number":"$pn","title":"Patent $pn - OLED Material","patent_type":"invention","status":"granted","filing_date":"2024-01-15","publication_date":"2024-07-15","assignee":"KeyIP OLED Lab","abstract":"An organic electroluminescent compound for use in OLED devices, providing improved efficiency and lifetime.","jurisdiction":"US","ipc_codes":["H10K 50/00","C09K 11/06"],"claims":[{"no":1,"text":"An organic electroluminescent compound represented by Formula 1..."},{"no":2,"text":"The compound of claim 1, wherein Ar1 is a substituted or unsubstituted aryl group."}],"inventors":["Kim, Min-Soo","Lee, Ji-Hoon"],"family_id":"FAM-OLED-001","citations_forward":12,"citations_backward":8}}';
    }

    # Portfolio constellation (regex)
    location ~ ^/api/v1/portfolios/([^/]+)/constellation$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"portfolio_id":"$1","points":[{"x":0.45,"y":0.55,"r":12,"color":"green","label":"CN115650927B","category":"H10K 50/00"},{"x":0.55,"y":0.42,"r":10,"color":"blue","label":"US11678901B2","category":"H10K 85/00"},{"x":0.38,"y":0.65,"r":8,"color":"amber","label":"EP3988567B1","category":"H10K 50/00"},{"x":0.58,"y":0.72,"r":9,"color":"green","label":"CN115650928B","category":"C07D 403/04"},{"x":0.32,"y":0.38,"r":7,"color":"blue","label":"CN115650929B","category":"C09K 11/06"}],"clusters":[{"name":"OLED Emitters","center_x":0.45,"center_y":0.55,"radius":0.25},{"name":"Transport Materials","center_x":0.55,"center_y":0.70,"radius":0.20}],"white_spaces":[{"x":0.15,"y":0.80,"r":5,"label":"Hole Blocking","color":"gray"},{"x":0.80,"y":0.30,"r":5,"label":"Electron Injection","color":"gray"}],"total_points":5}}';
    }

    # Patent search
    location = /api/v1/patents/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"d0000001-0000-0000-0000-000000000001","patent_number":"CN115650927B","title":"OLED Blue Host Material and Method","patent_type":"invention","status":"granted","filing_date":"2024-03-15","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C09K 11/06"]},{"id":"d0000001-0000-0000-0000-000000000002","patent_number":"CN115650928B","title":"Hole Transport Material for OLED","patent_type":"invention","status":"granted","filing_date":"2024-05-20","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C07D 403/04"]},{"id":"d0000001-0000-0000-0000-000000000003","patent_number":"US11678901B2","title":"Phosphorescent Organometallic Compound","patent_type":"invention","status":"granted","filing_date":"2023-08-10","assignee_name":"KeyIP OLED Lab","jurisdiction":"US","ipc_codes":["H10K 85/00","C07F 15/00"]},{"id":"d0000001-0000-0000-0000-000000000004","patent_number":"CN115650929B","title":"TADF Material for Blue OLED","patent_type":"invention","status":"pending","filing_date":"2025-01-12","assignee_name":"KeyIP OLED Lab","jurisdiction":"CN","ipc_codes":["H10K 50/00","C09K 11/06"]},{"id":"d0000001-0000-0000-0000-000000000005","patent_number":"EP3988567B1","title":"Electron Transport Material for OLED","patent_type":"invention","status":"granted","filing_date":"2024-02-28","assignee_name":"KeyIP OLED Lab","jurisdiction":"EP","ipc_codes":["H10K 50/00","C07D 251/24"]}],"pagination":{"page":1,"pageSize":20,"total":5}}';
    }

    # ── NEW STUBS: endpoints that return 500 or 404 from apiserver ──

    # Molecules list (apiserver returns 500)
    location = /api/v1/molecules {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"c0000001-0000-0000-0000-000000000001","smiles":"c1ccc(-c2ccc(-n3c4ccccc4c4ccccc43)cc2)cc1","name":"CBP","molecular_formula":"C36H24N2","molecular_weight":484.59,"logp":7.8,"tpsa":6.48,"num_atoms":62,"num_rings":7,"num_aromatic_rings":6,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000003","smiles":"c1ccc2c(c1)n(-c1cccc(-n3c4ccccc4c4ccccc43)c1)c2ccccc2","name":"mCP","molecular_formula":"C30H20N2","molecular_weight":408.49,"logp":6.9,"tpsa":4.93,"num_atoms":52,"num_rings":6,"num_aromatic_rings":5,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000009","smiles":"c1ccc2c(c1)n(-c1cccc(-n3c4ccccc4c4ccccc43)c1)c2ccccc2","name":"Ir(ppy)3","molecular_formula":"C33H24IrN3","molecular_weight":654.78,"logp":7.2,"tpsa":9.86,"num_atoms":61,"num_rings":6,"num_aromatic_rings":6,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000007","smiles":"c1ccc(-n2c3ccccc3c3ccccc32)cc1","name":"DMAC-TRZ","molecular_formula":"C30H18N4","molecular_weight":434.49,"logp":5.8,"tpsa":8.92,"num_atoms":52,"num_rings":6,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000004","smiles":"c1ccc(-n2c3ccccc3c3ccccc32)cc1","name":"TAPC","molecular_formula":"C18H13N","molecular_weight":243.30,"logp":4.2,"tpsa":3.24,"num_atoms":32,"num_rings":4,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000005","smiles":"c1ccc(-n2c3ccccc3c3ccccc32)cc1","name":"TCTA","molecular_formula":"C18H13N","molecular_weight":243.30,"logp":4.5,"tpsa":3.24,"num_atoms":32,"num_rings":4,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000002","smiles":"c1ccc(-c2ccc(-n3c4ccccc4c4ccccc43)cc2)cc1","name":"CDBP","molecular_formula":"C36H24N2","molecular_weight":484.59,"logp":7.6,"tpsa":6.48,"num_atoms":62,"num_rings":7,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000008","smiles":"c1ccc(-n2c3ccccc3c3ccccc32)cc1","name":"2CzPN","molecular_formula":"C18H13N","molecular_weight":243.30,"logp":3.9,"tpsa":3.24,"num_atoms":32,"num_rings":4,"status":"active"}],"pagination":{"page":1,"pageSize":20,"total":8}}';
    }

    # Molecules search
    location = /api/v1/molecules/search {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"c0000001-0000-0000-0000-000000000001","smiles":"c1ccc(-c2ccc(-n3c4ccccc4c4ccccc43)cc2)cc1","name":"CBP","molecular_formula":"C36H24N2","molecular_weight":484.59,"logp":7.8,"tpsa":6.48,"status":"active"},{"id":"c0000001-0000-0000-0000-000000000003","smiles":"c1ccc2c(c1)n(-c1cccc(-n3c4ccccc4c4ccccc43)c1)c2ccccc2","name":"mCP","molecular_formula":"C30H20N2","molecular_weight":408.49,"logp":6.9,"tpsa":4.93,"status":"active"}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # Molecule detail (regex)
    location ~ ^/api/v1/molecules/([a-f0-9-]+)$ {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"$1","smiles":"c1ccc(-c2ccc(-n3c4ccccc4c4ccccc43)cc2)cc1","canonical_smiles":"c1ccc(-c2ccc(-n3c4ccccc4c4ccccc43)cc2)cc1","name":"CBP","molecular_formula":"C36H24N2","molecular_weight":484.59,"exact_mass":484.19,"logp":7.8,"tpsa":6.48,"num_atoms":62,"num_bonds":65,"num_rings":7,"num_aromatic_rings":6,"num_rotatable_bonds":4,"status":"active","source":"manual","inchi":"InChI=1S/C36H24N2","inchi_key":"YFOLBQOQUZOMPB-UHFFFAOYSA-N","aliases":["CBP","Bis(N-carbazolyl)-biphenyl"],"source_reference":"","metadata":{}}}';
    }

    # Dashboard index (404 from apiserver)
    location = /api/v1/dashboard {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"totalPatents":51,"activePatents":45,"pendingPatents":6,"highRiskAlerts":3,"dueThisMonth":2,"portfolioHealthScore":78}}';
    }

    # Infringement index (404 from apiserver)
    location = /api/v1/infringement {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"totalAlerts":5,"highRisk":2,"mediumRisk":2,"lowRisk":1}}';
    }

    # FTO index (404 from apiserver)
    location = /api/v1/fto {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"totalAnalyses":3,"highRisk":1,"mediumRisk":1,"lowRisk":1}}';
    }

    # =========================================================================
    # AUTH STUBS (dev mode, bypass apiserver bcrypt)
    # =========================================================================

    location = /api/v1/auth/signin {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"access_token":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.stub","token_type":"Bearer","expires_in":86400}}';
    }
    location = /api/v1/auth/me {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"b0000001-0000-0000-0000-000000000001","email":"turta@keyip.io","username":"turta","display_name":"Turta","locale":"zh-CN","status":"active","roles":["super_admin"]}}';
    }

    # =========================================================================
    # CATCH-ALL — proxy_pass to Go apiserver for real data endpoints
    # =========================================================================

    location /api/ {
        proxy_pass http://keyip-apiserver:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ \.js$ { add_header Content-Type application/javascript; }
    location / { try_files $uri $uri/ /index.html; }
}
