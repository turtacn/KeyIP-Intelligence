server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    index index.html;

    # =========================================================================
    # STUBS — only for endpoints WITHOUT Go apiserver handlers.
    # These serve hardcoded dev data; each will be replaced by a real handler.
    # All other /api/ routes → proxy_pass to keyip-apiserver:8080 (REAL data).
    # =========================================================================

    # --- Dashboard metrics (no Go handler yet) ---
    location = /api/v1/dashboard/metrics {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"totalPatents":51,"activePatents":45,"pendingPatents":6,"highRiskAlerts":3,"dueThisMonth":2,"monthlyApplicationTrend":[{"month":"Jan","filed":5,"granted":2},{"month":"Feb","filed":3,"granted":1},{"month":"Mar","filed":7,"granted":3},{"month":"Apr","filed":4,"granted":2},{"month":"May","filed":6,"granted":4},{"month":"Jun","filed":8,"granted":2}],"jurisdictionBreakdown":[{"jurisdiction":"CN","count":28},{"jurisdiction":"US","count":12},{"jurisdiction":"EP","count":6},{"jurisdiction":"JP","count":3},{"jurisdiction":"KR","count":2}],"competitorComparison":[{"name":"KeyIP","portfolioSize":51},{"name":"Samsung SDI","portfolioSize":12500},{"name":"LG Chem","portfolioSize":9800},{"name":"UDC","portfolioSize":4500}],"portfolioHealthScore":78,"upcomingDeadlines":[],"recentAlerts":[]}}';
    }

    # --- Alerts aggregation (no Go handler yet) ---
    location = /api/v1/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"alert-001","type":"deadline","severity":"high","title":"CN Patent Renewal Due","message":"Patent CN115650927B renewal fee due in 30 days","is_read":false,"created_at":"2026-05-10T08:00:00Z"},{"id":"alert-002","type":"infringement","severity":"high","title":"Potential Infringement Detected","message":"US11678901B2 may infringe your portfolio","is_read":false,"created_at":"2026-05-09T14:00:00Z"},{"id":"alert-003","type":"status","severity":"medium","title":"Patent Granted","message":"KR patent application has been granted","is_read":true,"created_at":"2026-05-08T10:00:00Z"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Lifecycle events listing (no Go handler yet) ---
    location = /api/v1/lifecycle/events {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"evt-001","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"filing","event_date":"2024-03-15","description":"Patent application filed with CNIPA"},{"id":"evt-002","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"publication","event_date":"2024-09-15","description":"Application published"},{"id":"evt-003","patent_id":"d0000001-0000-0000-0000-000000000001","event_type":"grant","event_date":"2025-01-20","description":"Patent granted"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Knowledge graph (no Go handler yet) ---
    location = /api/v1/knowledge-graph {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"nodes":[{"id":"d1","label":"CN115650927B","type":"patent"},{"id":"d2","label":"US11678901B2","type":"patent"},{"id":"c1","label":"CBP","type":"molecule"},{"id":"c7","label":"DMAC-TRZ","type":"molecule"},{"id":"c9","label":"Ir(ppy)3","type":"molecule"},{"id":"c8","label":"4CzIPN","type":"molecule"},{"id":"c4","label":"NPB","type":"molecule"}],"edges":[{"source":"d1","target":"c1","type":"contains"},{"source":"d1","target":"c7","type":"contains"},{"source":"d2","target":"c9","type":"contains"},{"source":"d2","target":"c8","type":"contains"}],"total_nodes":7,"total_edges":4}}';
    }

    # --- Partners (no Go handler yet) ---
    location = /api/v1/partners {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"p-001","name":"Tokyo Chemical Industry","type":"supplier","country":"JP","status":"active"},{"id":"p-002","name":"Sigma-Aldrich","type":"supplier","country":"US","status":"active"},{"id":"p-003","name":"Samsung Display","type":"collaborator","country":"KR","status":"active"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # --- Settings (no Go handler yet) ---
    location = /api/v1/settings {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"theme":"light","language":"en","notifications":true}}';
    }

    # --- Infringement alerts (no Go handler yet) ---
    location = /api/v1/infringement/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"inf-001","targetPatentId":"US11678901B2","triggerMoleculeId":"c0000001-0000-0000-0000-000000000009","riskLevel":"HIGH","literalScore":0.87,"detectedAt":"2026-04-28T10:00:00Z","status":"new"},{"id":"inf-002","targetPatentId":"CN115650927B","triggerMoleculeId":"c0000001-0000-0000-0000-000000000001","riskLevel":"MEDIUM","literalScore":0.72,"detectedAt":"2026-05-01T09:00:00Z","status":"reviewed"}],"pagination":{"page":1,"pageSize":20,"total":2}}';
    }

    # --- Portfolio scores (no Go handler yet) ---
    location = /api/v1/portfolios/scores {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"overall_score":78,"technical_score":82,"legal_score":71,"commercial_score":74}}';
    }

    # --- Portfolio coverage (no Go handler yet) ---
    location = /api/v1/portfolios/coverage {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"CN":28,"US":12,"EP":6,"JP":3,"KR":2}}';
    }

    # =========================================================================
    # ALIASES — frontend uses old paths, rewrite to Go handler paths
    # =========================================================================

    # lifecycle/deadlines → deadlines/upcoming (Go handler)
    location = /api/v1/lifecycle/deadlines {
        proxy_pass http://keyip-apiserver:8080/api/v1/deadlines/upcoming;
        proxy_set_header Host $host;
    }

    # fto/search → patents/check-fto (Go handler)
    location = /api/v1/fto/search {
        proxy_pass http://keyip-apiserver:8080/api/v1/patents/check-fto;
        proxy_set_header Host $host;
    }

    # infringement/watch → patents/assess-infringement (Go handler)
    location = /api/v1/infringement/watch {
        proxy_pass http://keyip-apiserver:8080/api/v1/patents/assess-infringement;
        proxy_set_header Host $host;
    }

    # portfolios/summary → portfolios/pf-001/analysis (Go handler)
    location = /api/v1/portfolios/summary {
        proxy_pass http://keyip-apiserver:8080/api/v1/portfolios/pf-001/analysis;
        proxy_set_header Host $host;
    }

    # portfolios/{id}/optimize alias (redirect POST)
    location = /api/v1/portfolio/optimize {
        proxy_pass http://keyip-apiserver:8080/api/v1/portfolios/pf-001/optimize;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # ALL OTHER /api/ ROUTES — proxy_pass to Go apiserver (REAL data)
    # This covers: molecules, patents, portfolios, lifecycle, workspaces,
    # reports, auth, healthz, ai, runtime, ws/events, etc.
    # =========================================================================
    location /api/ {
        proxy_pass http://keyip-apiserver:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ \.js$ { add_header Content-Type application/javascript; }
    location / { try_files $uri $uri/ /index.html; }
}
