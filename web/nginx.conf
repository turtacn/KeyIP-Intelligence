    location = /api/v1/portfolios/summary {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":{"id":"pf-001","name":"OLED Core Portfolio","description":"OLED emitter and transport materials","total_patents":15,"total_value":12500000,"by_jurisdiction":{"CN":8,"US":3,"EP":2,"JP":1,"KR":1},"by_status":{"granted":10,"pending":3,"draft":2},"by_year":{"2023":3,"2024":7,"2025":5},"top_ipc_codes":["H10K 50/00","H10K 85/00","C09K 11/06","C07D 403/04"],"recommendations":["Increase US filings for emitter technology","Consider EP divisional applications"]}}';
    }

    # Alerts (notifications)
    location = /api/v1/alerts {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"alert-001","type":"deadline","severity":"high","title":"CN Patent Renewal Due","message":"Patent CN115650927B renewal fee due in 30 days","is_read":false,"created_at":"2026-05-10T08:00:00Z"},{"id":"alert-002","type":"infringement","severity":"high","title":"Potential Infringement Detected","message":"US11678901B2 may infringe your portfolio","is_read":false,"created_at":"2026-05-09T14:00:00Z"},{"id":"alert-003","type":"status","severity":"medium","title":"Patent Granted","message":"KR patent application has been granted","is_read":true,"created_at":"2026-05-08T10:00:00Z"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
    }

    # Lifecycle deadlines
    location = /api/v1/lifecycle/deadlines {
        default_type application/json;
        return 200 '{"code":0,"message":"ok","data":[{"id":"dl-001","patent_id":"d0000001-0000-0000-0000-000000000001","patent_number":"CN115650927B","deadline_type":"renewal","due_date":"2026-06-15","status":"pending","description":"Annual renewal fee due"},{"id":"dl-002","patent_id":"d0000001-0000-0000-0000-000000000002","patent_number":"CN115650928B","deadline_type":"renewal","due_date":"2026-07-20","status":"pending","description":"Annual renewal fee due"},{"id":"dl-003","patent_id":"d0000001-0000-0000-0000-000000000003","patent_number":"US11678901B2","deadline_type":"maintenance","due_date":"2026-08-10","status":"pending","description":"USPTO maintenance fee"}],"pagination":{"page":1,"pageSize":20,"total":3}}';
