openapi: "3.0.3"

info:
  title: KeyIP-Intelligence API
  version: "1.0.0"
  description: |
    KeyIP-Intelligence is an AI-driven intellectual property lifecycle management platform
    designed for the OLED organic materials industry. It integrates molecular-level chemical
    understanding with patent law intelligence to support patent mining, infringement
    monitoring, portfolio optimization, and lifecycle management.

    ## Authentication

    All API endpoints require Bearer token authentication unless otherwise specified.
    Tokens are issued via the configured identity provider (Keycloak / OIDC-compatible).

    ## Pagination

    List endpoints support page-based pagination via `page` and `page_size` query parameters.
    Responses include pagination metadata.

    ## Error Handling

    All errors follow a unified structure:
    ```json
    {
      "code": "NOT_FOUND",
      "message": "The specified resource does not exist"
    }
    ```
  contact:
    name: KeyIP-Intelligence Open Source Community
    url: https://github.com/turtacn/KeyIP-Intelligence
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: https://api.keyip.example.com/api/v1
    description: Production server
  - url: https://staging-api.keyip.example.com/api/v1
    description: Staging server
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
    description: System health and readiness checks
  - name: Molecules
    description: Molecular structure management, similarity, and property calculations
  - name: Patents
    description: Patent CRUD, search, claims analysis, family, citations, FTO, and infringement assessment
  - name: Portfolios
    description: Patent portfolio management, analysis, valuation, gap analysis, and optimization
  - name: Lifecycle
    description: Patent lifecycle management including milestones, fees, timelines, annuities, legal status, and deadlines
  - name: Collaboration
    description: Workspace management, document sharing, member invitations, and permissions
  - name: Reporting
    description: Automated report generation (FTO, infringement, portfolio), templates, and downloads

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Returns 200 if the service process is alive.
      security: []
      operationId: healthLiveness
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 when all downstream dependencies are reachable.
      security: []
      operationId: healthReadiness
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"

  /healthz/detail:
    get:
      tags: [Health]
      summary: Detailed health status
      description: Returns per-component health status with latency information.
      security: []
      operationId: healthDetailed
      responses:
        "200":
          description: Detailed health info
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  version:
                    type: string
                  uptime:
                    type: string
                  components:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/ComponentCheck"

  # ---------------------------------------------------------------------------
  # Molecules
  # ---------------------------------------------------------------------------
  /api/v1/molecules:
    get:
      tags: [Molecules]
      summary: List molecules
      description: Returns a paginated list of molecules accessible to the current user.
      operationId: listMolecules
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: q
          in: query
          description: Free-text search query.
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag.
          schema:
            type: string
      responses:
        "200":
          description: Paginated molecule list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Molecules]
      summary: Create molecule
      description: Registers a new molecule record. SMILES is validated server-side.
      operationId: createMolecule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMoleculeRequest"
      responses:
        "201":
          description: Molecule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/molecules/{id}:
    get:
      tags: [Molecules]
      summary: Get molecule
      operationId: getMolecule
      parameters:
        - $ref: "#/components/parameters/MoleculeId"
      responses:
        "200":
          description: Molecule detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Molecules]
      summary: Update molecule
      operationId: updateMolecule
      parameters:
        - $ref: "#/components/parameters/MoleculeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMoleculeRequest"
      responses:
        "200":
          description: Molecule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Molecules]
      summary: Delete molecule
      operationId: deleteMolecule
      parameters:
        - $ref: "#/components/parameters/MoleculeId"
      responses:
        "200":
          description: Molecule deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/molecules/search/structure:
    post:
      tags: [Molecules]
      summary: Structure search
      description: Searches for molecules matching a structural query (substructure or exact).
      operationId: searchByStructure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StructureSearchRequest"
      responses:
        "200":
          description: Structure search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/molecules/search/similarity:
    post:
      tags: [Molecules]
      summary: Similarity search
      description: Searches for molecules structurally similar to the query molecule using fingerprint-based similarity.
      operationId: searchBySimilarity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimilaritySearchRequest"
      responses:
        "200":
          description: Similarity search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoleculeListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/molecules/properties/calculate:
    post:
      tags: [Molecules]
      summary: Calculate properties
      description: Calculates molecular properties (MW, LogP, TPSA, HBD, HBA, rotatable bonds) from SMILES.
      operationId: calculateProperties
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatePropertiesRequest"
      responses:
        "200":
          description: Calculated properties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyCalculationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------------------------------------------------------------------------
  # Patents
  # ---------------------------------------------------------------------------
  /api/v1/patents:
    get:
      tags: [Patents]
      summary: List patents
      operationId: listPatents
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: jurisdiction
          in: query
          schema:
            type: string
        - name: applicant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated patent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentListResponse"

    post:
      tags: [Patents]
      summary: Create patent
      operationId: createPatent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatentRequest"
      responses:
        "201":
          description: Patent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/patents/{id}:
    get:
      tags: [Patents]
      summary: Get patent
      operationId: getPatent
      parameters:
        - $ref: "#/components/parameters/PatentId"
      responses:
        "200":
          description: Patent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Patents]
      summary: Update patent
      operationId: updatePatent
      parameters:
        - $ref: "#/components/parameters/PatentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatentRequest"
      responses:
        "200":
          description: Patent updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Patents]
      summary: Delete patent
      operationId: deletePatent
      parameters:
        - $ref: "#/components/parameters/PatentId"
      responses:
        "200":
          description: Patent deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/search:
    post:
      tags: [Patents]
      summary: Search patents
      description: Full-text keyword search with optional structured filters.
      operationId: searchPatents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchPatentsRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/patents/search/advanced:
    post:
      tags: [Patents]
      summary: Advanced patent search
      description: Multi-field structured patent search.
      operationId: advancedSearchPatents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancedSearchRequest"
      responses:
        "200":
          description: Advanced search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/patents/stats:
    get:
      tags: [Patents]
      summary: Get patent statistics
      description: Returns aggregate statistics for patents, optionally filtered by jurisdiction or applicant.
      operationId: getPatentStats
      parameters:
        - name: jurisdiction
          in: query
          schema:
            type: string
        - name: applicant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Patent statistics
          content:
            application/json:
              schema:
                type: object

  /api/v1/patents/analyze-claims:
    post:
      tags: [Patents]
      summary: Analyze patent claims
      description: Parses and analyzes patent claims to extract claim structure, dependency tree, and counts.
      operationId: analyzeClaims
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeClaimsRequest"
      responses:
        "200":
          description: Claim analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimAnalysisResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/patents/{id}/family:
    get:
      tags: [Patents]
      summary: Get patent family
      description: Retrieves patent family members related by priority and jurisdiction.
      operationId: getPatentFamily
      parameters:
        - $ref: "#/components/parameters/PatentId"
      responses:
        "200":
          description: Patent family members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/{id}/citations:
    get:
      tags: [Patents]
      summary: Get citation network
      description: Retrieves forward and backward citation references for a patent.
      operationId: getCitationNetwork
      parameters:
        - $ref: "#/components/parameters/PatentId"
      responses:
        "200":
          description: Citation network
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitationNetworkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/check-fto:
    post:
      tags: [Patents]
      summary: Check freedom-to-operate
      description: Performs FTO analysis for a target molecule against specified jurisdictions.
      operationId: checkFTO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckFTORequest"
      responses:
        "200":
          description: FTO analysis result
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/patents/assess-infringement:
    post:
      tags: [Patents]
      summary: Assess infringement risk
      description: Evaluates infringement risk for a molecule against a specific patent.
      operationId: assessInfringementRisk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessInfringementRiskRequest"
      responses:
        "200":
          description: Infringement risk assessment
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ---------------------------------------------------------------------------
  # Portfolios
  # ---------------------------------------------------------------------------
  /api/v1/portfolios:
    get:
      tags: [Portfolios]
      summary: List portfolios
      operationId: listPortfolios
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Portfolio list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioListResponse"

    post:
      tags: [Portfolios]
      summary: Create portfolio
      operationId: createPortfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioRequest"
      responses:
        "201":
          description: Portfolio created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/portfolios/{id}:
    get:
      tags: [Portfolios]
      summary: Get portfolio
      operationId: getPortfolio
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Portfolio detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Portfolios]
      summary: Update portfolio
      operationId: updatePortfolio
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortfolioRequest"
      responses:
        "200":
          description: Portfolio updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Portfolios]
      summary: Delete portfolio
      operationId: deletePortfolio
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Portfolio deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/patents:
    post:
      tags: [Portfolios]
      summary: Add patents to portfolio
      operationId: addPortfolioPatents
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPatentsRequest"
      responses:
        "200":
          description: Patents added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Portfolios]
      summary: Remove patents from portfolio
      operationId: removePortfolioPatents
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioPatentsRequest"
      responses:
        "200":
          description: Patents removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/analysis:
    get:
      tags: [Portfolios]
      summary: Get portfolio analysis
      operationId: getPortfolioAnalysis
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Portfolio analysis
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/valuation:
    get:
      tags: [Portfolios]
      summary: Get portfolio valuation
      operationId: getPortfolioValuation
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Portfolio valuation
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/valuation/run:
    post:
      tags: [Portfolios]
      summary: Run portfolio valuation
      operationId: runPortfolioValuation
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Valuation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolio_id:
                    type: string
                  total_value:
                    type: number
                  by_jurisdiction:
                    type: object
                  by_status:
                    type: object
                  recommendations:
                    type: array
                    items:
                      type: object
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/gap-analysis:
    get:
      tags: [Portfolios]
      summary: Get portfolio gap analysis
      operationId: getPortfolioGapAnalysis
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Gap analysis
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/gap-analysis/run:
    post:
      tags: [Portfolios]
      summary: Run portfolio gap analysis
      operationId: runPortfolioGapAnalysis
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Gap analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolio_id:
                    type: string
                  total_patents:
                    type: integer
                  gap_findings:
                    type: array
                    items:
                      type: object
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portfolios/{id}/optimize:
    post:
      tags: [Portfolios]
      summary: Optimize portfolio
      description: Runs portfolio optimization and returns recommendations.
      operationId: optimizePortfolio
      parameters:
        - $ref: "#/components/parameters/PortfolioId"
      responses:
        "200":
          description: Optimization results
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolio_id:
                    type: string
                  total_patents:
                    type: integer
                  optimization_suggestions:
                    type: array
                    items:
                      type: object
                  estimated_value:
                    type: number
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Lifecycle
  # ---------------------------------------------------------------------------
  /api/v1/patents/{patentId}/lifecycle:
    get:
      tags: [Lifecycle]
      summary: Get patent lifecycle
      operationId: getPatentLifecycle
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      responses:
        "200":
          description: Patent lifecycle
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/{patentId}/lifecycle/advance:
    post:
      tags: [Lifecycle]
      summary: Advance lifecycle phase
      operationId: advanceLifecyclePhase
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvancePhaseRequest"
      responses:
        "200":
          description: Phase advanced
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/{patentId}/milestones:
    get:
      tags: [Lifecycle]
      summary: List milestones
      operationId: listMilestones
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      responses:
        "200":
          description: Milestone list
          content:
            application/json:
              schema:
                type: object

    post:
      tags: [Lifecycle]
      summary: Add milestone
      operationId: addMilestone
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMilestoneRequest"
      responses:
        "201":
          description: Milestone added
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/{patentId}/fees:
    get:
      tags: [Lifecycle]
      summary: List fees
      operationId: listFees
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      responses:
        "200":
          description: Fee list
          content:
            application/json:
              schema:
                type: object

    post:
      tags: [Lifecycle]
      summary: Record fee payment
      operationId: recordFee
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordFeeRequest"
      responses:
        "201":
          description: Fee recorded
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/patents/{patentId}/timeline:
    get:
      tags: [Lifecycle]
      summary: Get patent timeline
      operationId: getPatentTimeline
      parameters:
        - $ref: "#/components/parameters/PatentPathId"
      responses:
        "200":
