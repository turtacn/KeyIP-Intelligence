      type: object
      required: [molecule_smiles, jurisdictions]
      properties:
        molecule_smiles:
          type: string
        jurisdictions:
          type: array
          items:
            type: string
        exclude_patents:
          type: array
          items:
            type: string
        depth:
          type: string
          enum: [quick, standard, comprehensive]

    AssessInfringementRiskRequest:
      type: object
      required: [molecule_smiles, patent_id]
      properties:
        molecule_smiles:
          type: string
        patent_id:
          type: string
          format: uuid
        claim_numbers:
          type: array
          items:
            type: integer
        include_prosecution_history_analysis:
          type: boolean

