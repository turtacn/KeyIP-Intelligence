# =============================================================================
# Components
# =============================================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      description: Page number (starts at 1).
      schema:
        type: integer
        default: 1
        minimum: 1

    PageSize:
      name: page_size
      in: query
      description: Number of items per page (default 20, max 100).
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    MoleculeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PatentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PatentPathId:
      name: patentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PortfolioId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    LifecycleId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    WorkspaceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication token missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Caller lacks required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ServiceUnavailable:
      description: Service dependency not available
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # -------------------------------------------------------------------------
    # Common
    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.

    # -------------------------------------------------------------------------
    # Health
    # -------------------------------------------------------------------------
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          example: "alive"
        version:
          type: string
        uptime:
          type: string
          description: Human-readable uptime duration.

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        components:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentCheck"

    ComponentCheck:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        latency:
          type: string
          description: Human-readable latency duration.
        error:
          type: string

    # -------------------------------------------------------------------------
    # Molecules
    # -------------------------------------------------------------------------
    CreateMoleculeRequest:
      type: object
      required: [smiles]
      properties:
        name:
          type: string
        smiles:
          type: string
          description: SMILES string of the molecule.
        inchi:
          type: string
        mol_formula:
          type: string
          description: Molecular formula.
        properties:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string

    UpdateMoleculeRequest:
      type: object
      properties:
        name:
          type: string
        properties:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string

    MoleculeResponse:
      type: object
      description: Response returned by molecule endpoints. Shape determined by the service layer.

    MoleculeListResponse:
      type: object
      description: Paginated molecule list. Shape determined by the service layer.

    StructureSearchRequest:
      type: object
      required: [smiles]
      properties:
        smiles:
          type: string
          description: SMILES query.
        search_type:
          type: string
          enum: [substructure, exact]
          default: substructure
        max_results:
          type: integer
          default: 100
          maximum: 1000

    SimilaritySearchRequest:
      type: object
      required: [smiles]
      properties:
        smiles:
          type: string
          description: SMILES query.
        similarity_threshold:
          type: number
          format: double
          default: 0.7
          minimum: 0.0
          maximum: 1.0
        max_results:
          type: integer
          default: 100
          maximum: 1000

    CalculatePropertiesRequest:
      type: object
      required: [smiles, properties]
      properties:
        smiles:
          type: string
        properties:
          type: array
          description: Property names to calculate.
          items:
            type: string
            enum: [mw, logp, tpsa, hbd, hba, rotatable_bonds]

    PropertyCalculationResponse:
      type: object
      description: Calculated molecular properties. Shape determined by the service layer.

    # -------------------------------------------------------------------------
    # Patents
    # -------------------------------------------------------------------------
    CreatePatentRequest:
      type: object
      required: [title, application_no, applicant, filing_date, jurisdiction]
      properties:
        title:
          type: string
        abstract:
          type: string
        application_no:
          type: string
        publication_no:
          type: string
        applicant:
          type: string
        inventors:
          type: array
          items:
            type: string
        ipc_codes:
          type: array
          items:
            type: string
        filing_date:
          type: string
          format: date
        publication_date:
          type: string
          format: date
        claims:
          type: string
        description:
          type: string
        jurisdiction:
          type: string

    UpdatePatentRequest:
      type: object
      properties:
        title:
          type: string
        abstract:
          type: string
        claims:
          type: string
        description:
          type: string
        ipc_codes:
          type: array
          items:
            type: string

    PatentResponse:
      type: object
      description: Patent detail. Shape determined by the service layer.

    PatentListResponse:
      type: object
      description: Paginated patent list. Shape determined by the service layer.

    SearchPatentsRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        query_type:
          type: string
          enum: [keyword, fulltext]
          default: keyword
        page:
          type: integer
          default: 1
        page_size:
          type: integer
          default: 20
          maximum: 100
        sort_by:
          type: string
        sort_order:
          type: string
          enum: [asc, desc]
        filters:
          type: object
          properties:
            applicant:
              type: string
            ipc_code:
              type: string
            filing_date_from:
              type: string
              format: date
            filing_date_to:
              type: string
              format: date

    AdvancedSearchRequest:
      type: object
      properties:
        title:
          type: string
        abstract:
          type: string
        applicant:
          type: string
        inventor:
          type: string
        ipc_code:
          type: string
        jurisdiction:
          type: string
        filing_date_from:
          type: string
          format: date
        filing_date_to:
          type: string
          format: date
        keywords:
          type: array
          items:
            type: string
        page:
          type: integer
          default: 1
        page_size:
          type: integer
          default: 20
          maximum: 100

    AnalyzeClaimsRequest:
      type: object
      properties:
        patent_id:
          type: string
          format: uuid
        claim_texts:
          type: array
          items:
            type: string

    ClaimAnalysisResponse:
      type: object
      properties:
        patent_id:
          type: string
          format: uuid
        patent_title:
          type: string
        total_claims:
          type: integer
        independent_count:
          type: integer
        dependent_count:
          type: integer
        claims:
          type: array
          items:
            $ref: "#/components/schemas/ClaimSummary"
        claim_tree:
          type: object
        analyzed_at:
          type: string
          format: date-time

    ClaimSummary:
      type: object
      properties:
        number:
          type: integer
        type:
          type: string
          enum: [independent, dependent]
        text:
          type: string
        depends_on:
          type: array
          items:
            type: integer

    FamilyResponse:
      type: object
      properties:
        patent_id:
          type: string
          format: uuid
        patent_number:
          type: string
        family_id:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/FamilyMember"
        total_members:
          type: integer

    FamilyMember:
      type: object
      properties:
        id:
          type: string
        patent_number:
          type: string
        title:
          type: string
        jurisdiction:
          type: string
        filing_date:
          type: string
          format: date
        applicant:
          type: string
        relationship:
          type: string

    CitationNetworkResponse:
      type: object
      properties:
        patent_id:
          type: string
        patent_number:
          type: string
        title:
          type: string
        forward_citations:
          type: array
          items:
            $ref: "#/components/schemas/CitationRef"
        backward_citations:
          type: array
          items:
            $ref: "#/components/schemas/CitationRef"
        total_citations:
          type: integer

    CitationRef:
      type: object
      properties:
        patent_number:
          type: string
        title:
          type: string
        relation:
          type: string
          enum: [cites, cited_by]

