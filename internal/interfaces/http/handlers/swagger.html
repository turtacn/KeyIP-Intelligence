<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyIP-Intelligence API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
    body { background: #1a1a2e; color: #e0e0e0; }
    .topbar { background: #16213e; border-bottom: 2px solid #0f3460; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 20px; font-weight: 600; color: #e94560; letter-spacing: 0.5px; }
    .topbar span { font-size: 13px; color: #8899aa; }
    .topbar a { color: #e94560; text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }
    #swagger-ui { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .swagger-ui { color: #e0e0e0; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info .title { color: #e94560 !important; }
    .swagger-ui .info { margin: 20px 0; }
    .swagger-ui .scheme-container { background: #16213e !important; border: 1px solid #0f3460 !important; box-shadow: none !important; }
    .swagger-ui .opblock-tag { color: #e0e0e0 !important; border-bottom: 1px solid #0f3460 !important; }
    .swagger-ui .opblock-tag:hover { background: rgba(15,52,96,0.3) !important; }
    .swagger-ui .opblock { border: 1px solid #0f3460 !important; background: #16213e !important; }
    .swagger-ui .opblock .opblock-summary { border-bottom: 1px solid #0f3460 !important; }
    .swagger-ui .opblock .opblock-summary-description { color: #8899aa !important; }
    .swagger-ui .opblock-body { background: #1a1a2e !important; }
    .swagger-ui .opblock-body pre { background: #0d1b2a !important; color: #e0e0e0 !important; border: 1px solid #0f3460 !important; }
    .swagger-ui .opblock-body .opblock-section-header { background: #16213e !important; border-bottom: 1px solid #0f3460 !important; }
    .swagger-ui .opblock-body .opblock-section-header h4 { color: #e0e0e0 !important; }
    .swagger-ui table thead tr td, .swagger-ui table thead tr th { border-bottom: 1px solid #0f3460 !important; color: #8899aa !important; }
    .swagger-ui .parameter__name { color: #e0e0e0 !important; }
    .swagger-ui .parameter__type { color: #8899aa !important; }
    .swagger-ui .parameters-col_description { color: #8899aa !important; }
    .swagger-ui .response-col_status { color: #e0e0e0 !important; }
    .swagger-ui .response-col_description { color: #8899aa !important; }
    .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5 { color: #e0e0e0 !important; }
    .swagger-ui .btn { border-radius: 4px !important; }
    .swagger-ui .btn.execute { background-color: #e94560 !important; border-color: #e94560 !important; }
    .swagger-ui .btn.execute:hover { background-color: #d63851 !important; }
    .swagger-ui select { background: #0d1b2a !important; color: #e0e0e0 !important; border: 1px solid #0f3460 !important; }
    .swagger-ui .model-box { background: #0d1b2a !important; color: #e0e0e0 !important; }
    .swagger-ui .model { color: #e0e0e0 !important; }
    .swagger-ui .model-title { color: #e94560 !important; }
    .swagger-ui .prop-type { color: #4fc3f7 !important; }
    .swagger-ui .prop-format { color: #8899aa !important; }
    .swagger-ui .markdown p, .swagger-ui .markdown li { color: #8899aa !important; }
    .swagger-ui .loading-container { padding: 40px; text-align: center; color: #8899aa; }
    .swagger-ui input[type=text] { background: #0d1b2a !important; color: #e0e0e0 !important; border: 1px solid #0f3460 !important; }
    .swagger-ui textarea { background: #0d1b2a !important; color: #e0e0e0 !important; border: 1px solid #0f3460 !important; }
    .footer { text-align: center; padding: 20px; color: #556677; font-size: 12px; border-top: 1px solid #0f3460; margin-top: 40px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>KeyIP-Intelligence API</h1>
    <span><a href="/api/openapi.json" target="_blank">OpenAPI Spec (JSON)</a></span>
  </div>
  <div id="swagger-ui">
    <div class="loading-container">Loading API documentation...</div>
  </div>
  <div class="footer">
    KeyIP-Intelligence &mdash; AI-driven Intellectual Property Lifecycle Management
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: '/api/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        displayOperationId: false,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        docExpansion: 'list',
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        tryItOutEnabled: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: 'StandaloneLayout',
      });
    };
  </script>
</body>
</html>
